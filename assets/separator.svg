<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <defs>
    <style>
      :root {
        --grid: #EAEAEA;
        --accent: #AAAAAA;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --grid: #222222;
          --accent: #555555;
        }
      }

      .line { stroke: var(--grid); stroke-width: 1; }
      .cross { stroke: var(--accent); stroke-width: 1; fill: none; }
    </style>
  </defs>

  <!-- Left Cross -->
  <g transform="translate(40, 20)" class="cross">
    <path d="M -4 0 h 8 M 0 -4 v 8" />
  </g>

  <!-- Line -->
  <path d="M 60 20 h 680" class="line" />

  <!-- Right Cross -->
  <g transform="translate(760, 20)" class="cross">
    <path d="M -4 0 h 8 M 0 -4 v 8" />
  </g>
</svg>
