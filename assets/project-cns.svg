<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 195" width="450" height="195">
  <defs><style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
  
  :root {
    --bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #2563eb;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --border-color: #cbd5e1;
  }
  
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-blue: #79c0ff;
      --accent-purple: #d2a8ff;
      --border-color: #30363d;
    }
  }

  .bg { fill: var(--bg); transition: fill 0.3s; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .text-main { fill: var(--text-main); }
  .text-muted { fill: var(--text-muted); }
  .text-accent { fill: var(--accent); }
  
  .border { 
    stroke: var(--border-color); 
    stroke-width: 1; 
    stroke-dasharray: 4 4; 
    fill: none; 
  }
  
  .tag { 
    fill: transparent; 
    stroke: var(--border-color); 
    stroke-width: 1; 
    rx: 4; 
  }
  
  .tag-text { 
    fill: var(--text-muted); 
    font-size: 10px; 
  }
</style></defs>
  <rect width="100%" height="100%" class="bg" rx="8" />
  
  <!-- Dashed Border -->
  <rect x="5" y="5" width="440" height="185" rx="6" class="border" />
  
  <!-- Icon -->
  <g transform="translate(25, 20)">
    <path d="M18.8 9.2C18.4 5.6 15.5 3 12 3 9.4 3 7 4.6 6 6.9 2.6 7.4 0 10.4 0 14c0 3.9 3.1 7 7 7h11c3.9 0 7-3.1 7-7 0-3.6-2.8-6.6-6.2-6.8z" fill="none" stroke="var(--accent-blue)" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="25" y="75" font-size="14" font-weight="700" class="mono text-accent">CNS - Cloud Nexus Stream</text>
  
  <!-- Description -->
  <text x="25" y="95" font-size="12" class="mono text-muted">
    <tspan x="25" dy="0">Personal media cloud platform</tspan><tspan x="25" dy="16">for seamless streaming, sync</tspan><tspan x="25" dy="16">and sharing.</tspan>
  </text>
  
  <!-- Tags -->
  <g>
    
      <rect x="25" y="135" width="38" height="20" class="tag" />
      <text x="30" y="149" class="mono tag-text">MERN</text>
    
      <rect x="73" y="135" width="73" height="20" class="tag" />
      <text x="78" y="149" class="mono tag-text">Socket.io</text>
    
      <rect x="156" y="135" width="52" height="20" class="tag" />
      <text x="161" y="149" class="mono tag-text">FFmpeg</text>
    
      <rect x="218" y="135" width="52" height="20" class="tag" />
      <text x="223" y="149" class="mono tag-text">Docker</text>
    
  </g>
  
  <!-- Stats -->
  <g transform="translate(25, 170)">
    <!-- Star -->
    <path d="M8 2l1.83 3.71 4.09.59-2.96 2.89.7 4.08-3.66-1.92L4.34 13.27l.7-4.08-2.96-2.89 4.09-.59L8 2z" fill="none" stroke="var(--text-muted)" stroke-width="1.5"/>
    <text x="20" y="10" font-size="12" class="mono text-muted">0</text>
    
    <!-- Fork -->
    <path d="M48 2c-1.1 0-2 .9-2 2v2.59l3 3V12h-2v2h6v-2h-2V9.59l3-3V4c0-1.1-.9-2-2-2z" fill="none" stroke="var(--text-muted)" stroke-width="1.5" transform="scale(0.8) translate(23, 0)"/>
    <text x="78" y="10" font-size="12" class="mono text-muted">0</text>
  </g>
</svg>