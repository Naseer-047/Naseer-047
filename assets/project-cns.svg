
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&amp;display=swap');
      
      .card {
        fill: #09090b;
        stroke: #27272a;
        stroke-width: 1.5;
        rx: 12;
      }
      
      .title {
        fill: #fafafa;
        font-family: 'Outfit', sans-serif;
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      
      .desc {
        fill: #a1a1aa;
        font-family: 'Outfit', sans-serif;
        font-size: 13px;
        font-weight: 400;
      }

      .icon-bg {
        fill: #38bdf820;
        rx: 10;
      }
      
      .icon-path {
        fill: none;
        stroke: #38bdf8;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      
      /* Subtle CSS Animation */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-3px); }
        100% { transform: translateY(0px); }
      }
      
      .container {
        cursor: pointer;
      }
      
      .container:hover .card {
        stroke: #38bdf8;
        stroke-width: 2;
        transition: all 0.3s ease;
      }
      
      .container:hover .icon-group {
        animation: float 2s ease-in-out infinite;
      }
    </style>
    
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#09090b;stop-opacity:1" />
    </linearGradient>

    <!-- Glowing shadow for icon -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g class="container">
    <!-- Background Card -->
    <rect x="2" y="2" width="396" height="116" class="card" fill="url(#grad1)" />
    
    <!-- Icon Box -->
    <rect x="20" y="20" width="45" height="45" class="icon-bg" />
    
    <g class="icon-group" transform="translate(30, 30)" filter="url(#glow)">
      <path class="icon-path" d="M2 4h20v6H2z" /><path class="icon-path" d="M2 14h20v6H2z" /><path class="icon-path" d="M6 7h.01" /><path class="icon-path" d="M6 17h.01" />
    </g>
    
    <!-- Text -->
    <text x="85" y="40" class="title">CNS Cloud Nexus</text>
    <text x="85" y="68" class="desc">Personal secure cloud infrastructure</text>
    <text x="85" y="88" class="desc">built with Node & Docker.</text>
    
    <!-- Bottom Tech Dot -->
    <circle cx="85" cy="104" r="4" fill="#38bdf8" />
    <text x="95" y="108" class="desc" style="font-size: 11px; fill: #38bdf8">Node.js</text>
  </g>
</svg>
