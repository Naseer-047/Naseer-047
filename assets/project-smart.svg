<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 180" width="450" height="180">
  <defs><style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
  
  :root {
    --bg: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --accent: #2563eb;
    --accent-blue: #3b82f6;
    --accent-purple: #8b5cf6;
    --border-color: #cbd5e1;
  }
  
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d1117;
      --text-main: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-blue: #79c0ff;
      --accent-purple: #d2a8ff;
      --border-color: #30363d;
    }
  }

  .bg { fill: var(--bg); transition: fill 0.3s; }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .text-main { fill: var(--text-main); }
  .text-muted { fill: var(--text-muted); }
  .text-accent { fill: var(--accent); }
  
  .border { 
    stroke: var(--border-color); 
    stroke-width: 1; 
    stroke-dasharray: 4 4; 
    fill: none; 
  }
  
  .tag { 
    fill: transparent; 
    stroke: var(--border-color); 
    stroke-width: 1; 
    rx: 4; 
  }
  
  .tag-text { 
    fill: var(--text-muted); 
    font-size: 10px; 
  }
</style></defs>
  <rect width="100%" height="100%" class="bg" rx="8" />
  
  <!-- Dashed Border -->
  <rect x="5" y="5" width="440" height="170" rx="6" class="border" />
  
  <!-- Icon -->
  <g transform="translate(25, 20)">
    <path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2V3zm20 0h-6a4 4 0 00-4 4v14a3 3 0 013-3h6V3z" fill="none" stroke="var(--accent-purple)" stroke-width="2"/>
  </g>
  
  <!-- Title -->
  <text x="25" y="75" font-size="14" font-weight="700" class="mono text-accent">Smart Study Buddy</text>
  
  <!-- Description -->
  <text x="25" y="95" font-size="12" class="mono text-muted">
    <tspan x="25" dy="0">AI powered study companion</tspan><tspan x="25" dy="16">for students.</tspan>
  </text>
  
  <!-- Tags -->
  <g>
    
      <rect x="25" y="115" width="94" height="20" class="tag" />
      <text x="30" y="129" class="mono tag-text">React Native</text>
    
      <rect x="129" y="115" width="59" height="20" class="tag" />
      <text x="134" y="129" class="mono tag-text">Node.js</text>
    
      <rect x="198" y="115" width="59" height="20" class="tag" />
      <text x="203" y="129" class="mono tag-text">MongoDB</text>
    
  </g>
  
  <!-- Stats -->
  <g transform="translate(25, 155)">
    <!-- Star -->
    <path d="M8 2l1.83 3.71 4.09.59-2.96 2.89.7 4.08-3.66-1.92L4.34 13.27l.7-4.08-2.96-2.89 4.09-.59L8 2z" fill="none" stroke="var(--text-muted)" stroke-width="1.5"/>
    <text x="20" y="10" font-size="12" class="mono text-muted">63</text>
    
    <!-- Fork -->
    <path d="M48 2c-1.1 0-2 .9-2 2v2.59l3 3V12h-2v2h6v-2h-2V9.59l3-3V4c0-1.1-.9-2-2-2z" fill="none" stroke="var(--text-muted)" stroke-width="1.5" transform="scale(0.8) translate(50, 0)"/>
    <text x="65" y="10" font-size="12" class="mono text-muted">18</text>
  </g>
</svg>