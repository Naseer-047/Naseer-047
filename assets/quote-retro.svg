<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 120" width="450" height="120">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      :root {
        --bg: #09090b;
        --text-main: #e4e4e7;
        --text-muted: #a1a1aa;
        --accent: #a3e635;
      }
      .bg { fill: var(--bg); }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .text-main { fill: var(--text-main); }
      .text-muted { fill: var(--text-muted); }
      .text-accent { fill: var(--accent); }
      .border-solid { stroke: var(--text-muted); stroke-width: 1; fill: none; opacity: 0.5; }
    </style>
  </defs>
  
  <rect width="100%" height="100%" class="bg" />

  <!-- Retro Quote Bracket Border -->
  <path d="M 15,10 L 5,10 L 5,110 L 15,110" class="border-solid" />
  <path d="M 435,10 L 445,10 L 445,110 L 435,110" class="border-solid" />
  
  <!-- Content -->
  <g transform="translate(30, 45)">
    <text x="0" y="0" font-size="36" font-weight="700" class="mono text-accent">“</text>
    <text x="40" y="-5" font-size="13" class="mono text-muted">
      <tspan x="40" dy="0">Code is not just what I write,</tspan>
      <tspan x="40" dy="20">it's how I solve problems.</tspan>
    </text>
    <text x="40" y="55" font-size="11" font-weight="700" class="mono text-accent">- Naseer Pasha</text>
  </g>
</svg>
