<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@100;400&amp;display=swap');
      
      :root {
        --bg: transparent;
        --grid: #EAEAEA;
        --text-primary: #111111;
        --text-secondary: #666666;
        --accent: #111111;
        --topo-line: rgba(0, 0, 0, 0.08);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: transparent;
          --grid: #222222;
          --text-primary: #F2F2F2;
          --text-secondary: #888888;
          --accent: #F2F2F2;
          --topo-line: rgba(255, 255, 255, 0.08);
        }
      }

      .bg { fill: var(--bg); }
      .grid { stroke: var(--grid); stroke-width: 0.5; }
      .text-primary { fill: var(--text-primary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .text-secondary { fill: var(--text-secondary); font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
      .text-mono { fill: var(--text-secondary); font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      
      .topo { 
        fill: none; 
        stroke: var(--topo-line); 
        stroke-width: 1;
        stroke-dasharray: 2000;
        stroke-dashoffset: 2000;
        animation: drawTopo 20s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

      @keyframes drawTopo {
        to { stroke-dashoffset: 0; }
      }

      @media (prefers-reduced-motion) {
        .topo { animation: none; stroke-dashoffset: 0; }
      }
      
      .crosshair { fill: var(--text-secondary); }
    </style>

    <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
    </pattern>
  </defs>

  <rect width="100%" height="100%" class="bg"/>
  <rect width="100%" height="100%" fill="url(#gridPattern)"/>

  <!-- Crosshairs at intersections -->
  <g class="crosshair">
    <path d="M 38 40 h 4 M 40 38 v 4" />
    <path d="M 758 40 h 4 M 760 38 v 4" />
    <path d="M 38 360 h 4 M 40 358 v 4" />
    <path d="M 758 360 h 4 M 760 358 v 4" />
  </g>

  <!-- Topographical Lines (Abstract) -->
  <g transform="translate(100, 50)">
    <path class="topo" d="M 0,200 C 100,250 200,100 400,200 C 550,280 600,100 700,250" />
    <path class="topo" d="M -50,150 C 120,280 250,50 450,180 C 580,260 620,80 750,220" style="animation-delay: 0.5s; stroke-dasharray: 2500; stroke-dashoffset: 2500;" />
    <path class="topo" d="M -100,100 C 150,300 300,0 500,160 C 600,240 650,60 800,180" style="animation-delay: 1s; stroke-dasharray: 3000; stroke-dashoffset: 3000;" />
    <path class="topo" d="M -150,50 C 180,320 350,-50 550,140 C 620,220 680,40 850,140" style="animation-delay: 1.5s; stroke-dasharray: 3500; stroke-dashoffset: 3500;" />
  </g>

  <!-- Typography -->
  <g transform="translate(40, 40)">
    <!-- Top Meta -->
    <text x="12" y="10" font-size="10" class="text-mono" letter-spacing="1">40.7128° N, 74.0060° W</text>
    <text x="708" y="10" font-size="10" class="text-mono" letter-spacing="1" text-anchor="end">SYS.RDY // 2026</text>
    
    <!-- Title -->
    <text x="10" y="160" font-size="56" font-weight="600" class="text-primary" letter-spacing="-2">NASEER</text>
    <text x="12" y="195" font-size="20" font-weight="400" class="text-secondary" letter-spacing="-0.5">Software Engineer</text>
    
    <!-- Subtitle / Motto -->
    <text x="12" y="235" font-size="14" font-weight="300" class="text-secondary" letter-spacing="0">Crafting robust architectures.</text>
    <text x="12" y="255" font-size="14" font-weight="300" class="text-secondary" letter-spacing="0">Obsessed with product quality.</text>
  </g>

  <!-- Border Frame -->
  <rect x="20" y="20" width="760" height="360" fill="none" class="grid" stroke-width="1"/>
  
</svg>
