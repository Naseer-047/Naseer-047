
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 195" width="800" height="195">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400&amp;display=swap');
      
      .bg { fill: #000000; stroke: #a3e635; stroke-width: 2; rx: 8; ry: 8; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .text-green { fill: #a3e635; }
      .text-white { fill: #ffffff; }
      .text-grey { fill: #a1a1aa; }
      
      .blink { animation: blinker 1s linear infinite; }
      @keyframes blinker { 50% { opacity: 0; } }
    </style>
  </defs>

  <rect x="1" y="1" width="798" height="193" class="bg" />

  <!-- Terminal Header -->
  <g transform="translate(20, 25)">
    <circle cx="0" cy="0" r="6" fill="#ff5f56" />
    <circle cx="20" cy="0" r="6" fill="#ffbd2e" />
    <circle cx="40" cy="0" r="6" fill="#27c93f" />
    <text x="70" y="5" font-size="14" class="mono text-grey" font-weight="700">~/quote-of-the-day.sh</text>
  </g>

  <line x1="0" y1="40" x2="800" y2="40" stroke="#333" stroke-width="1" />

  <!-- Quote Text -->
  
  <text x="30" y="60" font-size="18" class="mono text-white">
    <tspan class="text-green">"</tspan>Sometimes it pays to stay in bed on Monday, rather
  </text>

  <text x="30" y="85" font-size="18" class="mono text-white">
    than spending the rest of the week debugging
  </text>

  <text x="30" y="110" font-size="18" class="mono text-white">
    Monday's code.<tspan class="text-green">"</tspan>
  </text>


  <!-- Author -->
  <text x="770" y="170" font-size="16" class="mono text-grey" text-anchor="end" font-style="italic">
    — Dan Salomon <tspan class="text-green blink">_</tspan>
  </text>
</svg>
