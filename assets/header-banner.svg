<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 280" width="1000" height="280">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
      
      :root {
        --bg: #0D1117;
        --border: #30363d;
        --text-main: #c9d1d9;
        --text-muted: #8b949e;
        --accent: #A3E635;
      }
      
      .bg { fill: var(--bg); }
      .text-main { fill: var(--text-main); font-family: 'Inter', -apple-system, sans-serif; }
      .text-muted { fill: var(--text-muted); font-family: 'Inter', -apple-system, sans-serif; }
      .text-accent { fill: var(--accent); font-family: 'Inter', -apple-system, sans-serif; }
      .mono { font-family: 'JetBrains Mono', monospace; }
      .border { stroke: var(--border); stroke-width: 1; fill: none; }
      .card { fill: #161b22; stroke: var(--border); stroke-width: 1; rx: 8; }
    </style>
    
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="100%" height="100%" class="bg" rx="10"/>

  <!-- BACKGROUND NETWORKING LINES -->
  <g stroke="var(--accent)" stroke-width="1.5" opacity="0.3">
    <path d="M 600,0 L 700,100 L 900,100" fill="none"/>
    <path d="M 700,100 L 750,250 L 920,250" fill="none"/>
    <path d="M 500,200 L 600,280 L 700,280" fill="none"/>
    <circle cx="700" cy="100" r="4" fill="var(--accent)" filter="url(#glow)" opacity="1"/>
    <circle cx="900" cy="100" r="2" fill="var(--accent)"/>
    <circle cx="600" cy="0" r="2" fill="var(--accent)"/>
    <circle cx="750" cy="250" r="3" fill="var(--accent)"/>
    <circle cx="600" cy="280" r="2" fill="var(--accent)"/>
    
    <!-- Concentric radar circles -->
    <circle cx="700" cy="100" r="60" fill="none" stroke="var(--accent)" opacity="0.2"/>
    <circle cx="700" cy="100" r="120" fill="none" stroke="var(--accent)" opacity="0.1"/>
  </g>

  <!-- HEADER TEXT -->
  <text x="40" y="60" font-size="16" class="text-main" font-weight="600">Hi, I'm</text>
  <text x="40" y="115" font-size="54" font-weight="800" class="text-main" letter-spacing="-1">NASEER</text>
  <text x="255" y="115" font-size="54" font-weight="800" class="text-accent" letter-spacing="-1">PASHA</text>
  
  <text x="40" y="155" font-size="14" class="text-muted mono">// Building digital products that make an impact.</text>
  
  <!-- TAGS -->
  <g transform="translate(40, 185)">
    <!-- Active Tag -->
    <rect x="0" y="0" width="180" height="30" rx="4" stroke="var(--accent)" stroke-width="1" fill="rgba(163, 230, 53, 0.05)"/>
    <text x="90" y="20" font-size="12" font-weight="600" class="text-accent mono" text-anchor="middle">FULL-STACK DEVELOPER</text>
    
    <!-- Inactive Tags -->
    <rect x="195" y="0" width="130" height="30" rx="4" class="border"/>
    <text x="260" y="20" font-size="12" font-weight="500" class="text-muted mono" text-anchor="middle">PROBLEM SOLVER</text>
    
    <rect x="340" y="0" width="140" height="30" rx="4" class="border"/>
    <text x="410" y="20" font-size="12" font-weight="500" class="text-muted mono" text-anchor="middle">LIFELONG LEARNER</text>
  </g>
  
  <!-- SOCIAL ICONS -->
  <g transform="translate(40, 230)" opacity="0.8">
    <!-- GitHub -->
    <rect x="0" y="0" width="36" height="36" rx="8" class="border" fill="#161b22"/>
    <path d="M18 10a8 8 0 00-2.5 15.6c.4.1.5-.2.5-.4v-1.4c-2.2.5-2.7-1-2.7-1-.4-.9-.9-1.2-.9-1.2-.7-.5.1-.5.1-.5.8.1 1.2.8 1.2.8.7 1.2 1.9.9 2.3.7.1-.5.3-.9.5-1.1-1.8-.2-3.6-.9-3.6-4 0-.9.3-1.6.8-2.1-.1-.2-.4-1 .1-2.1 0 0 .7-.2 2.2.8.6-.2 1.3-.3 2-.3.7 0 1.4.1 2 .3 1.5-1 2.2-.8 2.2-.8.4 1.1.1 1.9.1 2.1.5.5.8 1.2.8 2.1 0 3.1-1.9 3.7-3.7 3.9.3.3.6.8.6 1.6v2.4c0 .2.1.5.6.4A8 8 0 0018 10z" fill="var(--text-main)"/>
    
    <!-- LinkedIn -->
    <rect x="46" y="0" width="36" height="36" rx="8" class="border" fill="#161b22"/>
    <path d="M13 14h2v7h-2v-7zm1-3a1.2 1.2 0 100 2.4 1.2 1.2 0 000-2.4zm3 3h2v1h.1c.3-.6 1.1-1.2 2.2-1.2 2.4 0 2.8 1.6 2.8 3.6V21h-2v-3.5c0-1 0-2.1-1.3-2.1-1.3 0-1.5 1-1.5 2V21h-2v-7z" fill="var(--text-main)"/>
    
    <!-- Link -->
    <rect x="92" y="0" width="36" height="36" rx="8" class="border" fill="#161b22"/>
    <path d="M14 13.5a3.5 3.5 0 107 0 3.5 3.5 0 00-7 0zm2 0a1.5 1.5 0 113 0 1.5 1.5 0 01-3 0z" fill="var(--text-main)"/>
    
    <!-- Mail -->
    <rect x="138" y="0" width="36" height="36" rx="8" class="border" fill="#161b22"/>
    <path d="M10 13l8 5 8-5v8H10v-8zm8 3.8L11.5 12h13L18 16.8z" fill="var(--text-main)"/>
  </g>

  <!-- TERMINAL WINDOW -->
  <g transform="translate(680, 60)">
    <rect x="0" y="0" width="220" height="140" class="card"/>
    <text x="15" y="30" font-size="13" class="text-accent mono">naseer@dev:~$ <tspan fill="var(--text-main)">whoami</tspan></text>
    <text x="15" y="60" font-size="13" class="text-accent mono">&gt; <tspan fill="var(--text-muted)">Code.</tspan></text>
    <text x="15" y="80" font-size="13" class="text-accent mono">&gt; <tspan fill="var(--text-muted)">Design.</tspan></text>
    <text x="15" y="100" font-size="13" class="text-accent mono">&gt; <tspan fill="var(--text-muted)">Ship.</tspan></text>
    <text x="15" y="120" font-size="13" class="text-accent mono">&gt; <tspan fill="var(--text-muted)">Repeat.</tspan></text>
  </g>
</svg>
